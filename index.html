<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock Rinde Dos</title>
    
    <link rel="manifest" href="manifest.json">
    <script>
        // Verificación de compatibilidad y protocolo para evitar errores en entornos de prueba
        if ('serviceWorker' in navigator && window.location.protocol.startsWith('http')) {
            navigator.serviceWorker.register('sw.js').catch(err => {
                console.log("Service Worker no se registró (entorno de prueba):", err);
            });
        }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.292.0",
          "firebase/app": "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js",
          "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js"
        }
      }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 antialiased font-sans">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { Home, PlusCircle, MinusCircle, List, Search, LogOut, Settings, Edit2, Trash2, Check, X } from 'lucide-react';
        
        import { initializeApp } from 'firebase/app';
        import { getFirestore, collection, doc, onSnapshot, setDoc } from 'firebase/firestore';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';

        const firebaseConfig = {
            apiKey: "AIzaSyDNwNcdzSxuL3q4C8_rL8CAEp3ypEuH-k4",
            authDomain: "rindedos-7f352.firebaseapp.com",
            projectId: "rindedos-7f352",
            storageBucket: "rindedos-7f352.firebasestorage.app",
            messagingSenderId: "417789919326",
            appId: "1:417789919326:web:1b9e89d3626c5e0c5774cf"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        const SABORES_BASE = ["Naranja", "Manzana", "Pera", "Durazno", "Multifruta", "Limonada", "Frutilla"];
        const SABORES_MAXI = ["Naranja 1+1", "Manzana 1+1", "Limón 1+1"];

        const calcularCajas = (totalSobres) => {
            const grandes = Math.floor(totalSobres / 240);
            const restoGrandes = totalSobres % 240;
            const chicas = Math.floor(restoGrandes / 10);
            const sueltos = restoGrandes % 10;
            return { grandes, chicas, sueltos };
        };

        const sobresDesdeCajas = (grandes, chicas, sueltos) => {
            return (grandes * 240) + (chicas * 10) + sueltos;
        };

        function App() {
            const [user, setUser] = useState(null);
            const [sucursal, setSucursal] = useState(null);
            const [vista, setVista] = useState('inicio'); 
            const [datosStock, setDatosStock] = useState({ gondola: {}, deposito: {} });
            
            // Estados para Gestor de Sabores
            const [configOpen, setConfigOpen] = useState(false);
            const [saboresActivos, setSaboresActivos] = useState([]);

            const mesActual = new Date().toISOString().slice(0, 7); 

            useEffect(() => {
                signInAnonymously(auth);
                const unsub = onAuthStateChanged(auth, (u) => setUser(u));
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user || !sucursal) return;

                const appId = "rindedos-app";
                
                // Carga de Stock
                const docRefStock = doc(db, 'artifacts', appId, 'public', 'data', sucursal, mesActual);
                const unsubStock = onSnapshot(docRefStock, (docSnap) => {
                    if (docSnap.exists()) {
                        setDatosStock(docSnap.data());
                    } else {
                        setDatosStock({ gondola: {}, deposito: {} });
                    }
                }, (error) => console.error("Error BD:", error));

                // Carga de Sabores Personalizados
                const docRefSabores = doc(db, 'artifacts', appId, 'public', 'config', `sabores_${sucursal}`);
                const unsubSabores = onSnapshot(docRefSabores, (docSnap) => {
                    if (docSnap.exists()) {
                        setSaboresActivos(docSnap.data().lista || []);
                    } else {
                        // Asignar los por defecto si es la primera vez
                        const defaults = sucursal === 'Maxiconsumo' ? [...SABORES_BASE, ...SABORES_MAXI] : [...SABORES_BASE];
                        setSaboresActivos(defaults);
                        setDoc(docRefSabores, { lista: defaults });
                    }
                });

                return () => {
                    unsubStock();
                    unsubSabores();
                };
            }, [user, sucursal, mesActual]);

            if (!sucursal) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen bg-orange-50 p-6">
                        <div className="w-full max-w-sm text-center">
                            <div className="bg-orange-500 text-white p-6 rounded-3xl shadow-xl mb-10">
                                <h1 className="text-3xl font-black mb-2">Rinde Dos</h1>
                                <p className="text-orange-100">Control de Stock Móvil</p>
                            </div>
                            
                            <h2 className="text-xl font-bold text-gray-700 mb-6">Selecciona una sucursal</h2>
                            
                            <button 
                                onClick={() => { setSucursal('Diarco'); setVista('inicio'); }}
                                className="w-full bg-white border-2 border-blue-500 text-blue-600 font-bold text-lg py-5 rounded-2xl mb-4 shadow-sm active:scale-95 transition-transform"
                            >
                                Diarco
                            </button>
                            
                            <button 
                                onClick={() => { setSucursal('Maxiconsumo'); setVista('inicio'); }}
                                className="w-full bg-white border-2 border-green-500 text-green-600 font-bold text-lg py-5 rounded-2xl shadow-sm active:scale-95 transition-transform"
                            >
                                Maxiconsumo
                            </button>
                        </div>
                    </div>
                );
            }

            const ModalSabores = () => {
                const [nuevoSabor, setNuevoSabor] = useState("");
                const [editando, setEditando] = useState(null);
                const [editValor, setEditValor] = useState("");

                const agregarSabor = async () => {
                    if (!nuevoSabor.trim()) return;
                    const nuevaLista = [...saboresActivos, nuevoSabor.trim()];
                    await setDoc(doc(db, 'artifacts', 'rindedos-app', 'public', 'config', `sabores_${sucursal}`), { lista: nuevaLista });
                    setNuevoSabor("");
                };

                const eliminarSabor = async (sabor) => {
                    // Solo lo quita de la lista visual, no rompe el stock
                    const nuevaLista = saboresActivos.filter(s => s !== sabor);
                    await setDoc(doc(db, 'artifacts', 'rindedos-app', 'public', 'config', `sabores_${sucursal}`), { lista: nuevaLista });
                };

                const guardarEdicion = async (oldName) => {
                    const newName = editValor.trim();
                    if (!newName || newName === oldName) {
                        setEditando(null);
                        return;
                    }

                    // Actualizamos la lista de sabores
                    const nuevaLista = saboresActivos.map(s => s === oldName ? newName : s);
                    await setDoc(doc(db, 'artifacts', 'rindedos-app', 'public', 'config', `sabores_${sucursal}`), { lista: nuevaLista });

                    // Migramos el stock del nombre viejo al nuevo en BD para no perder datos
                    const g = datosStock.gondola[oldName];
                    const d = datosStock.deposito[oldName];
                    
                    if (g !== undefined || d !== undefined) {
                        const nG = { ...datosStock.gondola };
                        const nD = { ...datosStock.deposito };
                        
                        if (g !== undefined) { nG[newName] = (nG[newName] || 0) + g; delete nG[oldName]; }
                        if (d !== undefined) { nD[newName] = (nD[newName] || 0) + d; delete nD[oldName]; }
                        
                        await setDoc(doc(db, 'artifacts', 'rindedos-app', 'public', 'data', sucursal, mesActual), {
                            gondola: nG, deposito: nD
                        });
                    }

                    setEditando(null);
                };

                return (
                    <div className="fixed inset-0 bg-black/60 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4 transition-opacity">
                        <div className="bg-white rounded-t-3xl sm:rounded-3xl w-full sm:max-w-md p-6 max-h-[90vh] flex flex-col shadow-2xl">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-xl font-black text-gray-800">Gestionar Sabores</h2>
                                <button onClick={() => setConfigOpen(false)} className="bg-gray-100 p-2 rounded-full text-gray-500 hover:bg-gray-200">
                                    <X size={20}/>
                                </button>
                            </div>
                            
                            <div className="flex gap-2 mb-6">
                                <input 
                                    value={nuevoSabor} 
                                    onChange={e => setNuevoSabor(e.target.value)} 
                                    placeholder="Ej: Mix Frutal..." 
                                    className="flex-1 border-2 border-gray-200 rounded-xl p-3 bg-gray-50 focus:border-orange-500 outline-none font-medium" 
                                />
                                <button onClick={agregarSabor} className="bg-orange-500 active:scale-95 text-white p-3 rounded-xl font-bold transition-transform">
                                    <PlusCircle size={24}/>
                                </button>
                            </div>

                            <p className="text-xs text-gray-400 font-bold uppercase tracking-wider mb-3">Sabores guardados</p>
                            
                            <div className="flex-1 overflow-y-auto space-y-2 pb-10">
                                {saboresActivos.map(sabor => (
                                    <div key={sabor} className="flex justify-between items-center p-3 bg-white border-2 border-gray-100 rounded-xl shadow-sm">
                                        {editando === sabor ? (
                                            <div className="flex flex-1 gap-2">
                                                <input value={editValor} onChange={e=>setEditValor(e.target.value)} className="flex-1 border-2 border-orange-500 rounded-lg p-2 outline-none font-bold text-gray-700" />
                                                <button onClick={()=>guardarEdicion(sabor)} className="text-white p-2 bg-green-500 rounded-lg active:scale-95"><Check size={18}/></button>
                                                <button onClick={()=>setEditando(null)} className="text-gray-500 p-2 bg-gray-200 rounded-lg active:scale-95"><X size={18}/></button>
                                            </div>
                                        ) : (
                                            <>
                                                <span className="font-bold text-gray-700">{sabor}</span>
                                                <div className="flex gap-2">
                                                    <button onClick={()=>{setEditando(sabor); setEditValor(sabor);}} className="text-blue-500 p-2 bg-blue-50 rounded-lg active:bg-blue-100"><Edit2 size={18}/></button>
                                                    <button onClick={()=>eliminarSabor(sabor)} className="text-red-500 p-2 bg-red-50 rounded-lg active:bg-red-100"><Trash2 size={18}/></button>
                                                </div>
                                            </>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            };

            const renderInicio = () => {
                const todosLosSabores = [...new Set([...Object.keys(datosStock.gondola || {}), ...Object.keys(datosStock.deposito || {})])];
                const saboresConStock = todosLosSabores.filter(s => (datosStock.gondola[s] || 0) + (datosStock.deposito[s] || 0) > 0);

                return (
                    <div className="p-4 space-y-4 pb-28">
                        <h2 className="text-2xl font-black text-gray-800">Resumen General</h2>
                        <p className="text-gray-500 mb-4">Mes: {mesActual}</p>

                        {saboresConStock.length === 0 ? (
                            <p className="text-center text-gray-400 mt-10 font-medium">Aún no hay stock cargado.</p>
                        ) : (
                            saboresConStock.map(sabor => {
                                const cantGondola = datosStock.gondola[sabor] || 0;
                                const cantDeposito = datosStock.deposito[sabor] || 0;
                                const total = cantGondola + cantDeposito;
                                
                                const cajasTotal = calcularCajas(total);
                                const cajasGondola = calcularCajas(cantGondola);
                                const cajasDeposito = calcularCajas(cantDeposito);

                                return (
                                    <div key={sabor} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 mb-4">
                                        <div className="flex justify-between items-center border-b border-gray-100 pb-2 mb-3">
                                            <h3 className="font-bold text-gray-800 text-lg">{sabor}: <span className="text-orange-600 ml-1">{total} un.</span></h3>
                                        </div>
                                        
                                        <div className="flex gap-2 justify-center mb-4">
                                            <span className="bg-orange-500 text-white px-3 py-1.5 rounded-lg text-sm font-bold">{cajasTotal.grandes} Grandes</span>
                                            <span className="bg-orange-400 text-white px-3 py-1.5 rounded-lg text-sm font-bold">{cajasTotal.chicas} Chicas</span>
                                            <span className="bg-orange-300 text-white px-3 py-1.5 rounded-lg text-sm font-bold">{cajasTotal.sueltos} Sueltos</span>
                                        </div>

                                        <div className="flex justify-between text-xs text-gray-700">
                                            <div className="bg-blue-50 p-2 rounded-xl w-[48%] text-center border border-blue-100">
                                                <span className="font-bold text-blue-700 block mb-1">📍 Góndola</span>
                                                {cajasGondola.grandes}G - {cajasGondola.chicas}C - {cajasGondola.sueltos}S
                                            </div>
                                            <div className="bg-purple-50 p-2 rounded-xl w-[48%] text-center border border-purple-100">
                                                <span className="font-bold text-purple-700 block mb-1">📦 Depósito</span>
                                                {cajasDeposito.grandes}G - {cajasDeposito.chicas}C - {cajasDeposito.sueltos}S
                                            </div>
                                        </div>
                                    </div>
                                );
                            })
                        )}
                    </div>
                );
            };

            const renderTotales = () => {
                const todosLosSabores = [...new Set([...Object.keys(datosStock.gondola || {}), ...Object.keys(datosStock.deposito || {})])];
                const saboresConStock = todosLosSabores.filter(s => (datosStock.gondola[s] || 0) + (datosStock.deposito[s] || 0) > 0);
                
                let granTotal = 0;

                return (
                    <div className="p-4 space-y-4 pb-28">
                        <h2 className="text-2xl font-black text-gray-800 mb-4">Totales del Mes</h2>
                        
                        <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                            {saboresConStock.length === 0 ? (
                                <p className="text-center text-gray-400">Sin stock registrado.</p>
                            ) : (
                                <div className="space-y-3">
                                    {saboresConStock.map(sabor => {
                                        const total = (datosStock.gondola[sabor] || 0) + (datosStock.deposito[sabor] || 0);
                                        granTotal += total;
                                        return (
                                            <div key={sabor} className="flex justify-between items-center border-b border-gray-50 pb-2">
                                                <span className="font-bold text-gray-700">{sabor}</span>
                                                <span className="font-black text-gray-900">{total} un.</span>
                                            </div>
                                        );
                                    })}
                                    <div className="pt-4 mt-4 border-t-2 border-dashed border-gray-200 flex justify-between items-center">
                                        <span className="font-black text-gray-800 uppercase tracking-widest text-sm">Gran Total</span>
                                        <span className="font-black text-orange-600 text-2xl">{granTotal}</span>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                );
            };

            const FormularioStock = ({ modo }) => {
                const isSuma = modo === 'sumar';
                const [busqueda, setBusqueda] = useState("");
                const [ubicacion, setUbicacion] = useState("gondola");
                const [cantidades, setCantidades] = useState({ grandes: 0, chicas: 0, sueltos: 0 });
                const [saborSeleccionado, setSaborSeleccionado] = useState(null);
                
                // Sistema de alertas elegante en UI (sin usar alert() nativo)
                const [mensajeUI, setMensajeUI] = useState(""); 

                const saboresFiltrados = saboresActivos.filter(s => s.toLowerCase().includes(busqueda.toLowerCase()));

                const guardarStock = async () => {
                    setMensajeUI(""); // Limpiar errores

                    if (!saborSeleccionado) {
                        setMensajeUI("Selecciona un sabor de la lista.");
                        return;
                    }
                    
                    const sobresNuevos = sobresDesdeCajas(cantidades.grandes, cantidades.chicas, cantidades.sueltos);
                    if (sobresNuevos === 0) {
                        setMensajeUI("Ingresa al menos 1 caja o suelto.");
                        return;
                    }

                    const cantidadActual = datosStock[ubicacion]?.[saborSeleccionado] || 0;
                    let nuevaCantidad = isSuma ? cantidadActual + sobresNuevos : cantidadActual - sobresNuevos;
                    
                    if (nuevaCantidad < 0) nuevaCantidad = 0; 

                    const appId = "rindedos-app";
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', sucursal, mesActual);
                    
                    const nuevoDocumento = {
                        ...datosStock,
                        [ubicacion]: {
                            ...datosStock[ubicacion],
                            [saborSeleccionado]: nuevaCantidad
                        }
                    };

                    await setDoc(docRef, nuevoDocumento);
                    
                    setSaborSeleccionado(null);
                    setBusqueda("");
                    setCantidades({ grandes: 0, chicas: 0, sueltos: 0 });
                    
                    // Volver al inicio tras guardar con exito
                    setVista('inicio'); 
                };

                return (
                    <div className="p-4 flex flex-col min-h-full pb-28">
                        <h2 className={`text-2xl font-black mb-6 ${isSuma ? 'text-green-600' : 'text-red-600'}`}>
                            {isSuma ? 'Agregar Stock' : 'Descontar Stock'}
                        </h2>

                        <div className="relative mb-4">
                            <Search className="absolute left-3 top-3 text-gray-400" size={20} />
                            <input 
                                type="text" 
                                placeholder="Buscar sabor (o elige abajo)..." 
                                className="w-full pl-10 pr-4 py-3 rounded-xl border-2 border-gray-200 focus:border-orange-500 outline-none font-medium text-gray-800"
                                value={busqueda}
                                onChange={(e) => {setBusqueda(e.target.value); setMensajeUI("");}}
                            />
                        </div>

                        {!saborSeleccionado && (
                            <div className="bg-white rounded-xl shadow-sm border border-gray-100 max-h-64 overflow-y-auto mb-4">
                                {saboresFiltrados.map(sabor => (
                                    <button 
                                        key={sabor} 
                                        onClick={() => {setSaborSeleccionado(sabor); setMensajeUI("");}}
                                        className="w-full text-left p-4 border-b last:border-b-0 hover:bg-orange-50 active:bg-orange-100 font-bold text-gray-700 transition-colors"
                                    >
                                        {sabor}
                                    </button>
                                ))}
                                {saboresFiltrados.length === 0 && <p className="p-4 text-gray-400 text-center">No se encontraron sabores.</p>}
                            </div>
                        )}

                        {saborSeleccionado && (
                            <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 flex-1 flex flex-col mb-4">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="font-black text-2xl text-gray-800">{saborSeleccionado}</h3>
                                    <button onClick={() => setSaborSeleccionado(null)} className="text-gray-500 font-bold text-sm bg-gray-100 px-3 py-1 rounded-full">Cambiar</button>
                                </div>

                                <div className="flex bg-gray-100 p-1 rounded-xl mb-6">
                                    <button 
                                        onClick={() => setUbicacion('gondola')}
                                        className={`flex-1 py-3 rounded-lg font-bold text-sm transition-all ${ubicacion === 'gondola' ? 'bg-white shadow-sm text-blue-600' : 'text-gray-500'}`}
                                    >
                                        Góndola
                                    </button>
                                    <button 
                                        onClick={() => setUbicacion('deposito')}
                                        className={`flex-1 py-3 rounded-lg font-bold text-sm transition-all ${ubicacion === 'deposito' ? 'bg-white shadow-sm text-purple-600' : 'text-gray-500'}`}
                                    >
                                        Depósito
                                    </button>
                                </div>

                                <div className="space-y-4 mb-8 flex-1">
                                    <div className="flex justify-between items-center bg-gray-50 p-4 rounded-xl border border-gray-100">
                                        <label className="font-bold text-gray-700 text-lg">Cajas Grandes</label>
                                        <input type="number" min="0" value={cantidades.grandes || ''} onChange={(e) => setCantidades({...cantidades, grandes: parseInt(e.target.value) || 0})} className="w-24 p-2 text-center font-bold text-xl border-2 border-gray-200 rounded-lg focus:outline-none focus:border-orange-500" placeholder="0" />
                                    </div>
                                    <div className="flex justify-between items-center bg-gray-50 p-4 rounded-xl border border-gray-100">
                                        <label className="font-bold text-gray-700 text-lg">Cajas Chicas</label>
                                        <input type="number" min="0" value={cantidades.chicas || ''} onChange={(e) => setCantidades({...cantidades, chicas: parseInt(e.target.value) || 0})} className="w-24 p-2 text-center font-bold text-xl border-2 border-gray-200 rounded-lg focus:outline-none focus:border-orange-500" placeholder="0" />
                                    </div>
                                    <div className="flex justify-between items-center bg-gray-50 p-4 rounded-xl border border-gray-100">
                                        <label className="font-bold text-gray-700 text-lg">Jugos Sueltos</label>
                                        <input type="number" min="0" value={cantidades.sueltos || ''} onChange={(e) => setCantidades({...cantidades, sueltos: parseInt(e.target.value) || 0})} className="w-24 p-2 text-center font-bold text-xl border-2 border-gray-200 rounded-lg focus:outline-none focus:border-orange-500" placeholder="0" />
                                    </div>
                                </div>

                                {mensajeUI && (
                                    <div className="bg-red-50 text-red-600 font-bold p-3 rounded-xl mb-4 text-center border border-red-100 animate-pulse">
                                        {mensajeUI}
                                    </div>
                                )}

                                <button 
                                    onClick={guardarStock}
                                    className={`w-full py-4 rounded-2xl font-black text-white text-lg active:scale-95 transition-transform shadow-lg ${isSuma ? 'bg-green-500 shadow-green-200' : 'bg-red-500 shadow-red-200'}`}
                                >
                                    {isSuma ? 'GUARDAR ENTRADA' : 'CONFIRMAR RESTA'}
                                </button>
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="flex flex-col h-screen overflow-hidden">
                    <header className="bg-white shadow-sm px-4 py-3 flex justify-between items-center z-10">
                        <div>
                            <p className="text-xs text-gray-400 font-black uppercase tracking-widest">Sucursal</p>
                            <h1 className="text-xl font-black text-orange-600 leading-none">{sucursal}</h1>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setConfigOpen(true)} className="text-gray-500 p-2.5 bg-gray-100 hover:bg-gray-200 rounded-full transition-colors">
                                <Settings size={20} />
                            </button>
                            <button onClick={() => setSucursal(null)} className="text-red-500 p-2.5 bg-red-50 hover:bg-red-100 rounded-full transition-colors">
                                <LogOut size={20} />
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto bg-gray-50 pb-32">
                        {vista === 'inicio' && renderInicio()}
                        {vista === 'nuevo' && <FormularioStock modo="sumar" />}
                        {vista === 'modificar' && <FormularioStock modo="restar" />}
                        {vista === 'totales' && renderTotales()}
                    </main>

                    <nav className="fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around pb-safe z-20 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
                        <button onClick={() => setVista('inicio')} className={`flex flex-col items-center p-3 w-1/4 transition-colors ${vista === 'inicio' ? 'text-orange-500' : 'text-gray-400'}`}>
                            <Home size={24} strokeWidth={vista === 'inicio' ? 2.5 : 2} />
                            <span className="text-[10px] font-bold mt-1">Inicio</span>
                        </button>
                        <button onClick={() => setVista('nuevo')} className={`flex flex-col items-center p-3 w-1/4 transition-colors ${vista === 'nuevo' ? 'text-green-500' : 'text-gray-400'}`}>
                            <PlusCircle size={24} strokeWidth={vista === 'nuevo' ? 2.5 : 2} />
                            <span className="text-[10px] font-bold mt-1">Agregar</span>
                        </button>
                        <button onClick={() => setVista('modificar')} className={`flex flex-col items-center p-3 w-1/4 transition-colors ${vista === 'modificar' ? 'text-red-500' : 'text-gray-400'}`}>
                            <MinusCircle size={24} strokeWidth={vista === 'modificar' ? 2.5 : 2} />
                            <span className="text-[10px] font-bold mt-1">Restar</span>
                        </button>
                        <button onClick={() => setVista('totales')} className={`flex flex-col items-center p-3 w-1/4 transition-colors ${vista === 'totales' ? 'text-blue-500' : 'text-gray-400'}`}>
                            <List size={24} strokeWidth={vista === 'totales' ? 2.5 : 2} />
                            <span className="text-[10px] font-bold mt-1">Totales</span>
                        </button>
                    </nav>

                    {configOpen && <ModalSabores />}
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
